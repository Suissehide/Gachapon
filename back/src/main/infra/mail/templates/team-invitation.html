<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Invitation — Gachapon</title></head>
<body style="margin:0;padding:0;background:#0f0f13;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#0f0f13;padding:40px 20px;">
    <tr><td align="center">
      <table width="520" cellpadding="0" cellspacing="0" style="background:#1a1a24;border-radius:16px;border:1px solid #2a2a3a;overflow:hidden;">
        <tr><td style="padding:32px 40px 0;text-align:center;">
          <h1 style="margin:0;font-size:22px;font-weight:900;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">Gachapon</h1>
        </td></tr>
        <tr><td style="padding:32px 40px;">
          <h2 style="margin:0 0 12px;font-size:20px;font-weight:800;color:#f0f0f8;">Tu es invité(e) à rejoindre <span style="color:#6366f1;">{{TEAM_NAME}}</span></h2>
          <p style="margin:0 0 28px;font-size:14px;color:#8888a8;line-height:1.6;"><strong style="color:#f0f0f8;">@{{INVITER_NAME}}</strong> t'a invité(e) à rejoindre son équipe. L'invitation expire dans <strong style="color:#f0f0f8;">48 heures</strong>.</p>
          <a href="{{INVITE_URL}}" style="display:inline-block;background:#6366f1;color:#fff;text-decoration:none;font-size:14px;font-weight:700;padding:14px 32px;border-radius:8px;">Rejoindre l'équipe →</a>
        </td></tr>
        <tr><td style="padding:20px 40px;border-top:1px solid #2a2a3a;text-align:center;">
          <p style="margin:0;font-size:11px;color:#555568;">Si tu ne veux pas rejoindre cette équipe, ignore cet email.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
