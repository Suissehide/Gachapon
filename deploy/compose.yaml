services:
  frontend:
    build:
      context: ../front
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    profiles:
      - prod

  backend:
    build:
      context: ../back
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - prod

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gachapon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gachapon}
      POSTGRES_DB: ${POSTGRES_DB:-gachapon}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gachapon}"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - db
      - prod

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - db
      - prod

volumes:
  pg_data:
  redis_data:
